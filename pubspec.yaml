name: nook
description: "A premium expense and income tracker app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # === DATABASE ===
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5

  # === STATE ===
  flutter_riverpod: ^2.6.1

  # === NAVIGATION ===
  go_router: ^17.1.0

  # === UI & ANIMATIONS ===
  fl_chart: ^1.1.1
  flutter_animate: ^4.5.0
  gap: ^3.0.1
  skeletonizer: ^2.1.3

  # === iOS NATIVE FEEL ===
  flutter_slidable: ^4.0.3
  haptic_feedback: ^0.6.4+3
  modal_bottom_sheet: ^3.0.0

  # === FORMS & FORMATTING ===
  currency_text_input_formatter: ^2.2.3
  intl: ^0.20.2

  # === DATA CLASSES ===
  json_annotation: ^4.9.0

  # === UTILITIES ===
  animations: ^2.0.11
  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.3
  flutter_secure_storage: ^10.0.0
  liquid_glass_renderer: ^0.2.0-dev.4
  liquid_glass_widgets: ^0.3.0-dev.1
  local_auth: ^3.0.1
  package_info_plus: ^9.0.0
  share_plus: ^12.0.1
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1
  json_serializable: ^6.8.0
  very_good_analysis: ^10.2.0
  flutter_launcher_icons: ^0.14.2
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
